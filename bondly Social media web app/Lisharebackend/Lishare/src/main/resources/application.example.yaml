spring:
  application:
    name: Bondly

  datasource:
    url: jdbc:postgresql://localhost:5432/bondly
    username: your_database_username
    password: your_database_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@example.com
    password: your_email_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload-dir: uploads

server:
  port: 4041

jwt:
  secret: replace_with_a_long_base64_encoded_secret

cookie:
  secure: false
  same-site: Lax
